<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALL ANALYTICS — 프로모션 대시보드</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  /* ── LIGHT (기본) ── */
  --bg: #eceef3;
  --card: #f8f9fc;
  --card-hover: #eef0f8;
  --border: #d9dce6;
  --text: #1b1e27;
  --text-dim: #6b7080;
  --accent: #4a6cf7;
  --accent-dim: #c7d2fc;
  --green: #12a875;
  --green-bg: rgba(18,168,117,.10);
  --yellow: #d99000;
  --yellow-bg: rgba(217,144,0,.10);
  --red: #e0453f;
  --red-bg: rgba(224,69,63,.10);
  --blue: #2f6fed;
  --purple: #8054e8;
  --purple-bg: rgba(128,84,232,.12);
  --shadow: 0 1px 3px rgba(20,20,40,.08);
}
html[data-theme="dark"] {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #22263a;
  --border: #2a2e3d;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --accent: #6c8cff;
  --accent-dim: #3d5199;
  --green: #34d399;
  --green-bg: rgba(52,211,153,.12);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.12);
  --blue: #60a5fa;
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,.15);
  --shadow: none;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Pretendard', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .2s,color .2s; }

/* ── Header ── */
.header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); }
.header h1 { font-size:18px; font-weight:700; letter-spacing:-.5px; }
.header h1 span { color:var(--accent); }
.header-right { display:flex; gap:12px; align-items:center; }
.theme-toggle { width:36px; height:36px; border:1px solid var(--border); background:var(--card); border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.theme-toggle:hover { background:var(--card-hover); }

/* ── Tab bar ── */
.tab-bar { display:flex; gap:4px; padding:12px 24px; border-bottom:1px solid var(--border); }
.tab-btn { padding:8px 16px; border:none; background:transparent; color:var(--text-dim); font-size:13px; font-weight:600; border-radius:6px; cursor:pointer; transition:.15s; }
.tab-btn.active { background:var(--accent); color:#fff; }
.tab-btn:hover:not(.active) { background:var(--card-hover); }

/* ── Panels ── */
.panel { display:none; padding:20px 24px; }
.panel.active { display:block; }

/* ── Week Nav ── */
.week-nav { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.week-nav button { width:32px; height:32px; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:6px; cursor:pointer; font-size:14px; box-shadow:var(--shadow); }
.week-nav button:hover { background:var(--card-hover); }
.week-label { font-size:14px; font-weight:600; color:var(--text-dim); }
.week-label strong { color:var(--text); }

/* ── Achiever bar ── */
.achiever-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.achiever-group { flex:1; min-width:220px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; box-shadow:var(--shadow); }
.achiever-group .ag-title { font-size:11px; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:5px; }
.achiever-group .ag-names { display:flex; flex-wrap:wrap; gap:5px; }
.ag-chip { font-size:11px; padding:3px 8px; border-radius:12px; font-weight:600; background:var(--bg); }
.ag-empty { font-size:11px; color:var(--text-dim); }
.ag-both .ag-title { color:var(--green); }
.ag-call .ag-title { color:var(--blue); }
.ag-sales .ag-title { color:var(--purple); }
.ag-none .ag-title { color:var(--red); }

/* ── Week history ── */
.history-title { font-size:12px; font-weight:700; color:var(--text-dim); margin:4px 0 8px; }
.history-row { display:flex; justify-content:space-between; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:12px; box-shadow:var(--shadow); cursor:pointer; }
.history-row:hover { background:var(--card-hover); }
.history-item { margin-bottom:6px; }
.history-arrow { display:inline-block; width:10px; color:var(--text-dim); }
.history-detail { background:transparent; }
.history-period { color:var(--text-dim); font-weight:600; }
.history-counts { display:flex; gap:12px; font-weight:600; }

/* ── Summary bar ── */
.summary-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.summary-card { flex:1; min-width:140px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; box-shadow:var(--shadow); }
.summary-card .label { font-size:11px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.summary-card .value { font-size:22px; font-weight:700; }
.summary-card .value.green { color:var(--green); }
.summary-card .value.yellow { color:var(--yellow); }
.summary-card .value.red { color:var(--red); }

/* ── Team section ── */
.teams-row { display:grid; grid-template-columns:repeat(var(--team-count, 5), minmax(0, 1fr)); gap:14px; align-items:start; }
.team-section { }
.team-title { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:6px; padding-left:2px; letter-spacing:.3px; text-align:center; }
.team-sales-summary { font-size:11px; color:var(--text-dim); margin-bottom:10px; padding-left:2px; line-height:1.6; text-align:center; }
.team-sales-summary strong { color:var(--text); font-weight:700; }
.card-grid { display:flex; flex-direction:column; gap:10px; }

/* ── Person card ── */
.person-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; transition:.15s; box-shadow:var(--shadow); }
.person-card:hover { background:var(--card-hover); border-color:var(--accent-dim); }
.person-card.exempt { border-color:var(--purple); box-shadow:0 0 0 1px var(--purple-bg); }
.person-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.person-name { font-size:14px; font-weight:700; }
.person-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
.badge-leave { background:var(--red-bg); color:var(--red); }
.badge-half { background:var(--yellow-bg); color:var(--yellow); }
.badge-exempt { background:var(--purple-bg); color:var(--purple); }

.metric-row { margin-bottom:8px; }
.metric-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:4px; }
.metric-label .pct { font-weight:700; }
.progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width .4s ease; }
.fill-green { background:var(--green); }
.fill-yellow { background:var(--yellow); }
.fill-red { background:var(--red); }
.fill-blue { background:var(--blue); }
.fill-purple { background:var(--purple); }
.metric-detail { font-size:11px; color:var(--text-dim); margin-top:3px; }
.sales-amount strong { font-size:13px; font-weight:800; color:var(--text); }

/* ── Lock screen ── */
.lock-screen { max-width:340px; margin:60px auto; text-align:center; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:36px 28px; box-shadow:var(--shadow); }
.lock-screen .icon { font-size:32px; margin-bottom:12px; }
.lock-screen input { width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; margin:14px 0; text-align:center; }
.lock-screen button { width:100%; padding:10px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
.lock-screen .lock-error { font-size:12px; color:var(--red); margin-top:8px; min-height:16px; }

/* ── Upload zone ── */
.upload-zone { border:2px dashed var(--border); border-radius:10px; padding:32px; text-align:center; cursor:pointer; transition:.2s; margin-bottom:16px; }
.upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:var(--accent-dim); }
.upload-zone .icon { font-size:32px; margin-bottom:8px; }
.upload-zone .label { font-size:13px; color:var(--text-dim); }
.upload-zone .label strong { color:var(--text); }

.file-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.file-tag { display:flex; align-items:center; gap:4px; background:var(--card); border:1px solid var(--border); padding:4px 10px; border-radius:6px; font-size:12px; }
.file-tag .remove { cursor:pointer; color:var(--red); font-weight:700; margin-left:4px; }

.upload-btn { padding:10px 24px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
.upload-btn:hover { opacity:.9; }
.upload-btn:disabled { opacity:.4; cursor:not-allowed; }

.upload-status { margin-top:10px; font-size:12px; color:var(--green); }
.upload-status.error { color:var(--red); }

/* ── Input forms ── */
.form-section { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; box-shadow:var(--shadow); }
.form-title { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--accent); }
.form-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.form-row select, .form-row input { padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; }
.form-row select { min-width:100px; }
.form-row input[type="date"] { min-width:140px; }
.form-row input[type="number"] { width:120px; }
.save-btn { padding:8px 16px; background:var(--green); color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; }
.save-btn:hover { opacity:.85; }

/* ── Roster table ── */
.roster-row { display:grid; grid-template-columns:1.2fr 1.2fr 1fr 1.2fr auto; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
.roster-row.head { font-size:11px; color:var(--text-dim); font-weight:700; border-bottom:2px solid var(--border); }
.roster-row input { padding:6px 8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; width:100%; }
.roster-name { font-size:13px; font-weight:600; }
.roster-del { width:26px; height:26px; border:none; background:var(--red-bg); color:var(--red); border-radius:6px; cursor:pointer; font-weight:700; }
.roster-del:hover { opacity:.8; }

/* ── Attendance/Sales record rows ── */
.record-row { display:grid; grid-template-columns:100px 80px 1fr 90px auto; gap:8px; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.record-date { color:var(--text-dim); }
.record-name { font-weight:600; }
.record-row select, .record-row input { padding:5px 8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; }

/* ── Loading ── */
.loading { text-align:center; padding:60px; color:var(--text-dim); }
.spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-bottom:8px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Toast ── */
.toast { position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border); padding:12px 20px; border-radius:8px; font-size:13px; z-index:999; opacity:0; transform:translateY(10px); transition:.3s; box-shadow:var(--shadow); }
.toast.show { opacity:1; transform:translateY(0); }

/* ── Responsive ── */
@media (max-width:640px) {
  .header { padding:12px 16px; }
  .panel { padding:16px; }
  .achiever-bar { flex-direction:column; }
  .teams-row { grid-template-columns:1fr; }
}
@media (min-width:641px) and (max-width:1100px) {
  .teams-row { grid-template-columns:repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>CALL</span> ANALYTICS</h1>
  <div class="header-right">
    <span style="font-size:11px;color:var(--text-dim)" id="versionTag"></span>
    <span style="font-size:11px;color:var(--text-dim)" id="lastUpload"></span>
    <span style="font-size:11px;color:var(--text-dim)" id="lastSync"></span>
    <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="dashboard">📊 현황 대시보드</button>
  <button class="tab-btn" data-tab="upload">📤 데이터 업로드</button>
  <button class="tab-btn" data-tab="input">✏️ 근태 · 이관매출</button>
  <button class="tab-btn" data-tab="roster">👥 인원관리</button>
</div>

<!-- ═══ 현황 대시보드 ═══ -->
<div id="panel-dashboard" class="panel active">
  <div class="week-nav">
    <button id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button id="nextWeek">›</button>
  </div>

  <div class="achiever-bar" id="achieverBar"></div>
  <div id="weekHistory"></div>

  <div id="teamCards"></div>
</div>

<!-- ═══ 데이터 업로드 (잠금) ═══ -->
<div id="panel-upload" class="panel">
  <div id="upload-lock"></div>
  <div id="upload-content" style="display:none">
    <div class="upload-zone" id="dropZone">
      <div class="icon">📁</div>
      <div class="label">통화 파일 <strong>2개</strong>를 드래그하거나 클릭하여 선택</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">1번 파일(녹취 시스템) + 2번 파일(통화목록 시스템)</div>
    </div>
    <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv" style="display:none">
    <div class="file-tags" id="fileTags"></div>
    <button class="upload-btn" id="uploadBtn" disabled>구글시트에 업로드</button>
    <div class="upload-status" id="uploadStatus"></div>
  </div>
</div>

<!-- ═══ 근태 · 이관매출 입력 (잠금) ═══ -->
<div id="panel-input" class="panel">
  <div id="input-lock"></div>
  <div id="input-content" style="display:none">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="weekLabelInput"></span>
      <button onclick="changeWeek(1)">›</button>
    </div>

    <div class="form-section">
      <div class="form-title">📅 근태 입력</div>
      <div class="form-row">
        <input type="date" id="attDate">
        <select id="attTeamFilter" onchange="filterAgentSelect('att')"></select>
        <select id="attAgent"></select>
        <select id="attType" onchange="toggleCustomMinInput()">
          <option value="연차">연차 (목표 100% 차감)</option>
          <option value="반차">반차 (목표 50% 적용)</option>
          <option value="기타">기타 (차감분 직접 입력)</option>
        </select>
        <input type="number" id="attCustomMin" placeholder="차감 분" style="display:none;width:100px;" min="0">
        <button class="save-btn" onclick="saveAttendance()">저장</button>
      </div>
      <div id="attStatus" style="font-size:12px;color:var(--text-dim);margin-top:8px;"></div>
      <div id="attList" style="margin-top:12px;"></div>
    </div>

    <div class="form-section">
      <div class="form-title">💰 이관매출 입력</div>
      <div class="form-row">
        <input type="date" id="salesDate">
        <select id="salesTeamFilter" onchange="filterAgentSelect('sales')"></select>
        <select id="salesAgent"></select>
        <input type="text" id="salesCompany" placeholder="업체명">
        <input type="number" id="salesAmount" placeholder="금액 (원)" step="10000">
        <button class="save-btn" onclick="saveSales()">저장</button>
      </div>
      <div id="salesStatus" style="font-size:12px;color:var(--text-dim);margin-top:8px;"></div>
      <div id="salesList" style="margin-top:12px;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ═══ 인원관리 (잠금) ═══ -->
<div id="panel-roster" class="panel">
  <div id="roster-lock"></div>
  <div id="roster-content" style="display:none">
    <div class="form-section">
      <div class="form-title">👥 인원 관리 (설정)</div>
      <div id="rosterTable"></div>

      <div class="form-row" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
        <input type="text" id="newAgentName" placeholder="이름">
        <input type="text" id="newAgentTeam" placeholder="소속팀" list="teamList">
        <datalist id="teamList"></datalist>
        <input type="number" id="newAgentDaily" placeholder="일목표(분)" value="60">
        <input type="number" id="newAgentWeekly" placeholder="주간이관목표(원)" value="2000000">
        <button class="save-btn" onclick="addAgent()">+ 인원 추가</button>
      </div>

      <button class="upload-btn" style="margin-top:16px;" onclick="saveRoster()">💾 구글시트에 저장</button>
      <div class="upload-status" id="rosterStatus"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwcK6nX6iyf2PAg7Cbs3LjplHruF-wYJV_j8f_h0Zr4ZHhv_9I4LcIXqvCaFVgzFiwLLw/exec';
const DASHBOARD_VERSION = 'v2.6';
const MONTHLY_EXEMPT_AMOUNT = 3000000; // 월 300만원 이상 달성 시 주간 이관목표 면제
const WEEKLY_SALES_GOAL_DEFAULT = 2000000;
const CALL_CAP_SEC = 1200; // 콜당 최대 20분 인정

// 첫 주 고정: 2026-07-01(수) ~ 2026-07-03(금)
const FIRST_WEEK_START = new Date(2026, 6, 1);
const FIRST_WEEK_END = new Date(2026, 6, 3);
// 이후 주는 이 월요일 기준 +7일 단위로 이동 (2026-07-06이 두 번째 주 월요일)
const SECOND_WEEK_MONDAY = new Date(2026, 6, 6);

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let STATE = {
  settings: [],
  calls: [],
  attendance: [],
  sales: [],
  weekOffset: 0,     // 0 = 첫 주(7/1~7/3), 1 = 7/6~7/10, -1 등
  weekStart: null,
  weekEnd: null,
  files: [],
  authed: false,
  rosterDraft: null  // 인원관리 작업용 임시 배열 (저장 전까지)
};

function getTeamOrder() {
  const teams = [...new Set(STATE.settings.map(s => s['소속팀']))];
  return teams.sort();
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('versionTag').textContent = DASHBOARD_VERSION;
  initTheme();
  initTabs();
  initUpload();
  STATE.authed = sessionStorage.getItem('ca_authed') === 'yes';
  if (STATE.authed) _pwCache = sessionStorage.getItem('ca_pw') || '';
  computeWeekRange();
  await loadAllData();
});

// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
function initTheme() {
  const saved = localStorage.getItem('ca-theme') || 'light';
  applyTheme(saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    const next = cur === 'light' ? 'dark' : 'light';
    applyTheme(next);
    localStorage.setItem('ca-theme', next);
  });
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ══════════════════════════════════════
// TABS (업로드/입력 탭은 비밀번호 잠금)
// ══════════════════════════════════════
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');

      if (btn.dataset.tab === 'upload') renderLockOrContent('upload');

    });
  });

        <button onclick="checkPassword('${zone}')">확인</button>

async function checkPassword(zone) {
  const pw = document.getElementById('pwInput-' + zone).value;
  const errEl = document.getElementById('pwError-' + zone);
  errEl.textContent = '확인 중...';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'verifyPassword', password: pw })
    });
    const result = await res.json();
    if (result.status === 'ok') {
      STATE.authed = true;
      _pwCache = pw;
      sessionStorage.setItem('ca_authed', 'yes');

  } catch (err) {
    errEl.textContent = '❌ 확인 실패: ' + err.message;

  const days = getWeekdayCount();

}

function getWeekDatesArray() {
  const days = getWeekdayCount();
  const arr = [];
  for (let i = 0; i < days; i++) {

// ══════════════════════════════════════
// NORMALIZE (파일 파싱용)
// ══════════════════════════════════════
function normalizeDept(raw) {
  if (!raw) return '';
  let s = String(raw).trim().toLowerCase().replace(/\s+/g, '');
  const m = s.match(/^bm(\d+)[-]?(\d+)팀?$/i);
  if (m) return `BM${m[1]}-${m[2]}팀`;
  const m2 = String(raw).trim().match(/^BM\d+-\d+팀$/);
  if (m2) return m2[0];
  return String(raw).trim();
}

function normalizeDate(val) {
  if (!val) return '';
  if (val instanceof Date) {
    const y = val.getFullYear();
    const mo = String(val.getMonth()+1).padStart(2,'0');
    const d = String(val.getDate()).padStart(2,'0');
    const h = String(val.getHours()).padStart(2,'0');
    const mi = String(val.getMinutes()).padStart(2,'0');
    return `${y}-${mo}-${d} ${h}:${mi}`;
  }
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}/.test(s)) return s.substring(0, 16);
  return s;
}

function normalizeDuration(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') {
    if (val < 1 && val > 0) return Math.round(val * 86400);
    return Math.round(val);
  }
  const s = String(val).trim();
  const parts = s.split(':');
  if (parts.length === 3) return (+parts[0])*3600 + (+parts[1])*60 + (+parts[2]);
  if (parts.length === 2) return (+parts[0])*60 + (+parts[1]);
  return parseInt(s) || 0;
}

// 같은 날짜+전화번호는 최장 통화만 인정, 콜당 최대 20분(CALL_CAP_SEC) 캡 적용
// 날짜가 바뀌면 그룹키(날짜 포함)가 달라지므로 자동으로 다시 집계됨
function computeCallTimeSec(calls) {
  const groups = {};
  calls.forEach(c => {
    const day = String(c['날짜']).substring(0, 10);
    const phone = c['전화번호'] || '';
    const key = day + '|' + phone;
    const dur = Number(c['통화시간']) || 0;
    if (!(key in groups) || dur > groups[key]) groups[key] = dur;
  });
  let total = 0;
  Object.values(groups).forEach(dur => { total += Math.min(dur, CALL_CAP_SEC); });
  return total;
}

// 세션 내에서만 사용할 비밀번호 캐시 (인증 성공 시 저장)
let _pwCache = '';
function getStoredPassword() { return _pwCache; }

function parseExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'yyyy-mm-dd hh:mm' });

        let headerIdx = 0;
        for (let i = 0; i < Math.min(3, json.length); i++) {
          const row = (json[i] || []).map(c => String(c||'').trim());
          if (row.includes('날짜') || row.includes('상담원이름') || row.includes('부서명')) {
            headerIdx = i;
            break;
          }
        }
        const headers = json[headerIdx].map(h => String(h||'').trim());
        const colMap = {};
        headers.forEach((h, i) => colMap[h] = i);

        const dateCol = colMap['날짜'] ?? 0;
        const agentCol = colMap['상담원이름'] ?? 2;
        const deptCol = colMap['부서명'] ?? 1;
        const typeCol = colMap['유형'] ?? headers.length - 1;
        const durCol = colMap['통화시간'] ?? 6;
        const phoneCol = colMap['고객전화번호'] ?? 5;

        const rows = [];
        for (let i = headerIdx + 1; i < json.length; i++) {
          const r = json[i];
          if (!r || !r[dateCol]) continue;
          rows.push({
            '날짜': normalizeDate(r[dateCol]),
            '상담원': String(r[agentCol]||'').trim(),
            '부서': normalizeDept(r[deptCol]),
            '유형': String(r[typeCol]||'').trim().toLowerCase() === 'in' ? 'in' : 'out',
            '통화시간': normalizeDuration(r[durCol]),
            '전화번호': String(r[phoneCol]||'').trim()
          });
        }
        resolve(rows);
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('파일 읽기 실패'));
    reader.readAsArrayBuffer(file);
  });
}

// ── 임의 기간(start~end)에 대한 상담원별 집계 (현재 주 / 히스토리 공용) ──
function computeAgentDataForRange(rangeStart, rangeEnd) {
  const dateStr = d => {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const wsStr = dateStr(rangeStart);
  const weStr = dateStr(rangeEnd);
  const rangeDates = [];
  const dayCount = Math.round((rangeEnd - rangeStart) / 86400000) + 1;
  for (let i = 0; i < dayCount; i++) {
    const d = new Date(rangeStart);
    d.setDate(rangeStart.getDate() + i);
    rangeDates.push(d);
  }

  const weekCalls = STATE.calls.filter(c => {
    const d = String(c['날짜']).substring(0, 10);
    return d >= wsStr && d <= weStr;
  });
  const weekAtt = STATE.attendance.filter(a => {
    const d = String(a['날짜']).substring(0, 10);
    return d >= wsStr && d <= weStr;
  });
  const weekSales = STATE.sales.filter(s => {
    const d = String(s['날짜']).substring(0, 10);
    return d >= wsStr && d <= weStr;
  });

  const monthStart = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
  const monthEnd = new Date(rangeStart.getFullYear(), rangeStart.getMonth() + 1, 0);
  const monthStartStr = dateStr(monthStart);
  const monthEndStr = dateStr(monthEnd);
  const monthSales = STATE.sales.filter(s => {
    const d = String(s['날짜']).substring(0, 10);
    return d >= monthStartStr && d <= monthEndStr;
  });

  const agentData = {};
  STATE.settings.forEach(s => {
    const name = s['상담원'];
    const dailyGoal = Number(s['일목표분']) || 0;
    const weekSalesGoal = Number(s['주간이관목표']) || WEEKLY_SALES_GOAL_DEFAULT;

    let goalDays = 0;
    let customDeductMin = 0;
    let leaveDays = [];
    rangeDates.forEach(d => {
      const ds = dateStr(d);
      const att = weekAtt.find(a => String(a['날짜']).substring(0,10) === ds && a['상담원'] === name);
      if (att) {
        if (att['구분'] === '연차') { goalDays += 0; leaveDays.push({ date: ds, type: '연차' }); }
        else if (att['구분'] === '반차') { goalDays += 0.5; leaveDays.push({ date: ds, type: '반차' }); }
        else if (att['구분'] === '기타') {
          goalDays += 1;
          const m = Number(att['차감분']) || 0;
          customDeductMin += m;
          leaveDays.push({ date: ds, type: `기타 -${m}분` });
        }
        else goalDays += 1;
      } else goalDays += 1;
    });

    const weekGoalMin = Math.max(0, dailyGoal * goalDays - customDeductMin);

    const myCalls = weekCalls.filter(c => c['상담원'] === name);
    const myOutCalls = myCalls.filter(c => c['유형'] === 'out');
    const totalSec = computeCallTimeSec(myOutCalls); // 아웃콜만 집계, 중복번호 최장통화만 + 20분 캡 적용
    const totalMin = totalSec / 60;
    const callCount = myCalls.length;
    const outCount = myOutCalls.length;

    const mySales = weekSales.filter(s => s['상담원'] === name);
    const totalSalesAmt = mySales.reduce((sum, s) => sum + (Number(s['금액']) || 0), 0);

    const myMonthSales = monthSales.filter(s => s['상담원'] === name);
    const monthlyTotal = myMonthSales.reduce((sum, s) => sum + (Number(s['금액']) || 0), 0);
    const monthlyExempt = monthlyTotal >= MONTHLY_EXEMPT_AMOUNT;

    const hasCallGoal = dailyGoal > 0 && weekGoalMin > 0;
    const callPct = hasCallGoal ? (totalMin / weekGoalMin * 100) : -1;
    const salesPct = weekSalesGoal > 0 ? (totalSalesAmt / weekSalesGoal * 100) : 0;

    agentData[name] = {
      dailyGoal, weekGoalMin, totalMin, totalSec, callCount, outCount,
      weekSalesGoal, totalSalesAmt, leaveDays, monthlyTotal, monthlyExempt,
      hasCallGoal, callPct, salesPct,
      callAchieved: hasCallGoal && callPct >= 100,
      salesAchieved: monthlyExempt || salesPct >= 100
    };
  });

  return agentData;
}

function computeWeekRangeForOffset(offset) {
  if (offset === 0) return { start: new Date(FIRST_WEEK_START), end: new Date(FIRST_WEEK_END) };
  const mon = new Date(SECOND_WEEK_MONDAY);
  mon.setDate(mon.getDate() + (offset - 1) * 7);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  return { start: mon, end: fri };
}

function renderDashboard() {
  const agentData = computeAgentDataForRange(STATE.weekStart, STATE.weekEnd);

  });

    let teamWeekSales = 0, teamMonthSales = 0;

      if (d) { teamWeekSales += d.totalSalesAmt; teamMonthSales += d.monthlyTotal; }

      html += renderPersonCard(name, d);

// ── 지난 주간 히스토리 (기본 접힘, 클릭 시 펼침) ──
function renderWeekHistory() {
  const el = document.getElementById('weekHistory');
  if (!el) return;
  if (STATE.weekOffset <= 0) { el.innerHTML = ''; return; }

  let html = '<div class="history-title">📜 지난 주간 기록</div>';
  let idx = 0;
  for (let offset = STATE.weekOffset - 1; offset >= 0; offset--) {
    const range = computeWeekRangeForOffset(offset);
    const data = computeAgentDataForRange(range.start, range.end);
    const both = [], callOnly = [], salesOnly = [], none = [];
    Object.entries(data).forEach(([name, d]) => {
      if (d.callAchieved && d.salesAchieved) both.push(name);
      else if (d.callAchieved) callOnly.push(name);
      else if (d.salesAchieved) salesOnly.push(name);
      else none.push(name);
    });
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    const chipList = (arr, cls) => arr.length
      ? arr.map(n => `<span class="ag-chip" style="color:var(${cls})">${n}</span>`).join('')
      : '<span class="ag-empty">없음</span>';

    html += `
      <div class="history-item">
        <div class="history-row" onclick="toggleHistoryRow(${idx})">
          <div class="history-period"><span class="history-arrow" id="histArrow${idx}">▸</span> ${fmt(range.start)}~${fmt(range.end)}</div>
          <div class="history-counts">
            <span style="color:var(--green)">🏆 ${both.length}</span>
            <span style="color:var(--blue)">📞 ${callOnly.length}</span>
            <span style="color:var(--purple)">💰 ${salesOnly.length}</span>
            <span style="color:var(--red)">⚠️ ${none.length}</span>
          </div>
        </div>
        <div class="history-detail" id="histDetail${idx}" style="display:none">
          <div class="achiever-bar" style="margin-top:8px;">
            <div class="achiever-group ag-both"><div class="ag-title">🏆 콜+이관 모두 달성 (${both.length}명)</div><div class="ag-names">${chipList(both,'--green')}</div></div>
            <div class="achiever-group ag-call"><div class="ag-title">📞 콜 달성 (${callOnly.length}명)</div><div class="ag-names">${chipList(callOnly,'--blue')}</div></div>
            <div class="achiever-group ag-sales"><div class="ag-title">💰 이관 달성 (${salesOnly.length}명)</div><div class="ag-names">${chipList(salesOnly,'--purple')}</div></div>
            <div class="achiever-group ag-none"><div class="ag-title">⚠️ 미달성 (${none.length}명)</div><div class="ag-names">${chipList(none,'--red')}</div></div>
          </div>
        </div>
      </div>`;
    idx++;
  }
  el.innerHTML = html;
}

function toggleHistoryRow(idx) {
  const detail = document.getElementById('histDetail' + idx);
  const arrow = document.getElementById('histArrow' + idx);
  const isOpen = detail.style.display !== 'none';

}

function renderPersonCard(name, d) {
  let badge = '';
  if (d.leaveDays.length > 0) {
    const types = d.leaveDays.map(l => l.type);
    if (types.includes('연차')) badge += `<span class="person-badge badge-leave">연차 ${d.leaveDays.filter(l=>l.type==='연차').length}일</span> `;
    if (types.includes('반차')) badge += `<span class="person-badge badge-half">반차 ${d.leaveDays.filter(l=>l.type==='반차').length}일</span> `;
    d.leaveDays.filter(l => l.type.startsWith('기타')).forEach(l => {
      badge += `<span class="person-badge badge-half">${l.type}</span> `;
    });
  }
  if (d.monthlyExempt) badge += `<span class="person-badge badge-exempt">이관 면제</span>`;

  let callBar = '';
  if (d.dailyGoal === 0) {
    callBar = `
      <div class="metric-row">
        <div class="metric-label"><span>📞 통화시간</span><span>${Math.round(d.totalMin)}분 (${d.callCount}건)</span></div>
        <div class="metric-detail">목표 미설정</div>
      </div>`;
  } else if (d.weekGoalMin === 0) {
    callBar = `
      <div class="metric-row">
        <div class="metric-label"><span>📞 통화시간</span><span>연차 주간</span></div>
      </div>`;
  } else {
    const pct = Math.min(d.callPct, 100);
    const cls = d.callPct >= 100 ? 'fill-green' : d.callPct >= 70 ? 'fill-yellow' : 'fill-red';
    const icon = d.callPct >= 100 ? ' ✅' : '';
    callBar = `
      <div class="metric-row">
        <div class="metric-label"><span>📞 통화시간</span><span class="pct">${Math.round(d.callPct)}%${icon}</span></div>
        <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="metric-detail">${Math.round(d.totalMin)}분 / ${Math.round(d.weekGoalMin)}분 (${d.outCount}건 아웃콜)</div>
      </div>`;
  }

  let salesBar;
  if (d.monthlyExempt) {
    const pct = Math.min(d.salesPct, 100);
    salesBar = `
      <div class="metric-row">
        <div class="metric-label"><span>💰 이관매출</span><span class="pct" style="color:var(--purple)">면제 ✅</span></div>
        <div class="progress-bar"><div class="progress-fill fill-purple" style="width:${pct}%"></div></div>
        <div class="metric-detail sales-amount">이번달 누적 <strong>${formatWon(d.monthlyTotal)}</strong> (월 300만원 달성)</div>
      </div>`;
  } else {
    const sPct = Math.min(d.salesPct, 100);
    const sCls = d.salesPct >= 100 ? 'fill-green' : d.salesPct >= 70 ? 'fill-yellow' : 'fill-red';
    const sIcon = d.salesPct >= 100 ? ' ✅' : '';
    salesBar = `
      <div class="metric-row">
        <div class="metric-label"><span>💰 이관매출</span><span class="pct">${Math.round(d.salesPct)}%${sIcon}</span></div>
        <div class="progress-bar"><div class="progress-fill ${sCls}" style="width:${sPct}%"></div></div>
        <div class="metric-detail sales-amount"><strong>${formatWon(d.totalSalesAmt)}</strong> / ${formatWon(d.weekSalesGoal)}</div>
      </div>`;
  }

  return `
    <div class="person-card ${d.monthlyExempt ? 'exempt' : ''}">
      <div class="person-header">
        <span class="person-name">${name}</span>
        <div>${badge}</div>
      </div>
      ${callBar}
      ${salesBar}
    </div>`;
}

function formatWon(n) {
  if (n >= 10000) return Math.round(n / 10000) + '만원';
  return n.toLocaleString() + '원';
}

let _dateDefaultsSet = false;
function populateAgentSelects() {
  // 팀 필터 드롭다운 채우기 (전체 + 팀 목록)
  const teamOrder = getTeamOrder();
  ['attTeamFilter', 'salesTeamFilter'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const prevValue = sel.value;
    sel.innerHTML = '<option value="">전체 팀</option>' + teamOrder.map(t => `<option value="${t}">${t}</option>`).join('');
    if (teamOrder.includes(prevValue)) sel.value = prevValue;
  });

  filterAgentSelect('att');
  filterAgentSelect('sales');

  const teamListEl = document.getElementById('teamList');
  if (teamListEl) {
    teamListEl.innerHTML = teamOrder.map(t => `<option value="${t}">`).join('');
  }
  // 날짜 기본값은 최초 1회만 오늘로 설정 (저장 후 새로고침 시 덮어쓰지 않음 — 안 그러면 입력한 날짜가 초기화되는 버그 발생)
  if (!_dateDefaultsSet) {
    const today = new Date().toISOString().substring(0, 10);
    const attDate = document.getElementById('attDate');
    const salesDate = document.getElementById('salesDate');
    if (attDate) attDate.value = today;
    if (salesDate) salesDate.value = today;
    _dateDefaultsSet = true;
  }
}

// 팀 필터 선택에 따라 상담원 드롭다운 옵션을 좁혀줌 (zone: 'att' | 'sales')
function filterAgentSelect(zone) {
  const teamFilterEl = document.getElementById(zone + 'TeamFilter');
  const agentSelEl = document.getElementById(zone + 'Agent');
  if (!agentSelEl) return;
  const selectedTeam = teamFilterEl ? teamFilterEl.value : '';
  const prevValue = agentSelEl.value;

  const filtered = selectedTeam
    ? STATE.settings.filter(s => s['소속팀'] === selectedTeam)
    : STATE.settings;

  agentSelEl.innerHTML = filtered.map(s => `<option value="${s['상담원']}">${s['상담원']}</option>`).join('');
  const names = filtered.map(s => s['상담원']);
  if (names.includes(prevValue)) agentSelEl.value = prevValue;
}

async function saveAttendance() {
  const date = document.getElementById('attDate').value;
  const agent = document.getElementById('attAgent').value;
  const type = document.getElementById('attType').value;
  const customMin = type === '기타' ? (Number(document.getElementById('attCustomMin').value) || 0) : 0;
  if (!date || !agent) return;
  if (type === '기타' && customMin <= 0) {
    document.getElementById('attStatus').textContent = '❌ 차감 분을 입력해주세요';
    return;
  }

  const status = document.getElementById('attStatus');
  status.textContent = '저장 중...';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveAttendance', data: [{ '날짜': date, '상담원': agent, '구분': type, '차감분': customMin }], password: getStoredPassword() })
    });
    const result = await res.json();
    if (result.status !== 'ok') throw new Error(result.message);
    status.textContent = type === '기타'
      ? `✅ ${agent} ${date} 기타(${customMin}분 차감) 저장 완료`
      : `✅ ${agent} ${date} ${type} 저장 완료`;
    showToast('근태 저장 완료');
    await loadAllData();
  } catch (err) {
    status.textContent = '❌ 실패: ' + err.message;
  }
}

// ROSTER (인원관리)
// ══════════════════════════════════════
function ensureRosterDraft() {
  if (!STATE.rosterDraft) {
    STATE.rosterDraft = STATE.settings.map(s => ({ ...s }));
  }
}

function renderRosterTable() {
  ensureRosterDraft();
  const el = document.getElementById('rosterTable');
  if (!el) return;

  let html = `
    <div class="roster-row head">
      <div>이름</div><div>소속팀</div><div>일목표(분)</div><div>주간이관목표(원)</div><div></div>
    </div>`;

  STATE.rosterDraft.forEach((a, idx) => {
    html += `
      <div class="roster-row">
        <div class="roster-name">${a['상담원']}</div>
        <input type="text" value="${a['소속팀']}" onchange="updateRosterField(${idx},'소속팀',this.value)">
        <input type="number" value="${a['일목표분']}" onchange="updateRosterField(${idx},'일목표분',this.value)">
        <input type="number" value="${a['주간이관목표']}" onchange="updateRosterField(${idx},'주간이관목표',this.value)">
        <button class="roster-del" onclick="deleteAgent(${idx})" title="삭제">✕</button>
      </div>`;
  });

  el.innerHTML = html;

  // 팀 자동완성 목록도 draft 기준으로 갱신
  const teamListEl = document.getElementById('teamList');
  if (teamListEl) {
    const teams = [...new Set(STATE.rosterDraft.map(a => a['소속팀']))].sort();
    teamListEl.innerHTML = teams.map(t => `<option value="${t}">`).join('');
  }
}

function updateRosterField(idx, field, value) {
  ensureRosterDraft();
  if (field === '일목표분' || field === '주간이관목표') value = Number(value) || 0;
  STATE.rosterDraft[idx][field] = value;
}

function addAgent() {
  ensureRosterDraft();
  const name = document.getElementById('newAgentName').value.trim();
  const team = document.getElementById('newAgentTeam').value.trim();
  const daily = Number(document.getElementById('newAgentDaily').value) || 0;
  const weekly = Number(document.getElementById('newAgentWeekly').value) || 2000000;
  const status = document.getElementById('rosterStatus');

  if (!name || !team) { status.className = 'upload-status error'; status.textContent = '❌ 이름과 소속팀을 입력해주세요'; return; }
  if (STATE.rosterDraft.some(a => a['상담원'] === name)) { status.className = 'upload-status error'; status.textContent = '❌ 이미 존재하는 이름입니다'; return; }

  STATE.rosterDraft.push({ '상담원': name, '소속팀': team, '일목표분': daily, '주간이관목표': weekly });
  document.getElementById('newAgentName').value = '';
  document.getElementById('newAgentTeam').value = '';
  document.getElementById('newAgentDaily').value = '60';
  document.getElementById('newAgentWeekly').value = '2000000';
  status.className = 'upload-status';
  status.textContent = `"${name}" 추가됨 (아직 저장 안 됨 — 아래 저장 버튼을 눌러주세요)`;
  renderRosterTable();
}

function deleteAgent(idx) {
  const name = STATE.rosterDraft[idx]['상담원'];
  if (!confirm(`"${name}"님을 삭제하시겠습니까? (통화·근태·이관매출 기록은 시트에 그대로 남고, 대시보드 집계에서만 제외됩니다)`)) return;
  STATE.rosterDraft.splice(idx, 1);
  document.getElementById('rosterStatus').textContent = `"${name}" 삭제됨 (아직 저장 안 됨 — 아래 저장 버튼을 눌러주세요)`;
  renderRosterTable();
}

async function saveRoster() {
  const status = document.getElementById('rosterStatus');
  status.className = 'upload-status';
  status.textContent = '구글시트에 저장 중...';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveSettings', data: STATE.rosterDraft, password: getStoredPassword() })
    });
    const result = await res.json();
    if (result.status !== 'ok') throw new Error(result.message);

    status.textContent = `✅ 저장 완료 (${result.saved}명)`;
    showToast('인원 설정 저장 완료');
    await loadAllData(); // 설정 재로드 → rosterDraft도 초기화됨
    STATE.rosterDraft = null;
    renderRosterTable();
  } catch (err) {
    status.className = 'upload-status error';
    status.textContent = '❌ 저장 실패: ' + err.message;
  }
}
