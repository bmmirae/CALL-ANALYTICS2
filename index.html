<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALL ANALYTICS — 프로모션 대시보드</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #22263a;
  --border: #2a2e3d;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --accent: #6c8cff;
  --accent-dim: #3d5199;
  --green: #34d399;
  --green-bg: rgba(52,211,153,.12);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.12);
  --blue: #60a5fa;
  --purple: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Pretendard', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── Header ── */
.header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); }
.header h1 { font-size:18px; font-weight:700; letter-spacing:-.5px; }
.header h1 span { color:var(--accent); }
.header-right { display:flex; gap:8px; align-items:center; }

/* ── Tab bar ── */
.tab-bar { display:flex; gap:4px; padding:12px 24px; border-bottom:1px solid var(--border); }
.tab-btn { padding:8px 16px; border:none; background:transparent; color:var(--text-dim); font-size:13px; font-weight:600; border-radius:6px; cursor:pointer; transition:.15s; }
.tab-btn.active { background:var(--accent); color:#fff; }
.tab-btn:hover:not(.active) { background:var(--card); }

/* ── Panels ── */
.panel { display:none; padding:20px 24px; }
.panel.active { display:block; }

/* ── Week Nav ── */
.week-nav { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.week-nav button { width:32px; height:32px; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:6px; cursor:pointer; font-size:14px; }
.week-nav button:hover { background:var(--card-hover); }
.week-label { font-size:14px; font-weight:600; color:var(--text-dim); }
.week-label strong { color:var(--text); }

/* ── Summary bar ── */
.summary-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.summary-card { flex:1; min-width:140px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
.summary-card .label { font-size:11px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.summary-card .value { font-size:22px; font-weight:700; }
.summary-card .value.green { color:var(--green); }
.summary-card .value.yellow { color:var(--yellow); }
.summary-card .value.red { color:var(--red); }

/* ── Team section ── */
.team-section { margin-bottom:24px; }
.team-title { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:10px; padding-left:2px; letter-spacing:.3px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:10px; }

/* ── Person card ── */
.person-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; transition:.15s; }
.person-card:hover { background:var(--card-hover); border-color:var(--accent-dim); }
.person-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.person-name { font-size:14px; font-weight:700; }
.person-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
.badge-leave { background:var(--red-bg); color:var(--red); }
.badge-half { background:var(--yellow-bg); color:var(--yellow); }
.badge-ok { background:var(--green-bg); color:var(--green); }

.metric-row { margin-bottom:8px; }
.metric-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:4px; }
.metric-label .pct { font-weight:700; }
.progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width .4s ease; }
.fill-green { background:var(--green); }
.fill-yellow { background:var(--yellow); }
.fill-red { background:var(--red); }
.fill-blue { background:var(--blue); }
.metric-detail { font-size:11px; color:var(--text-dim); margin-top:3px; }

/* ── Upload zone ── */
.upload-zone { border:2px dashed var(--border); border-radius:10px; padding:32px; text-align:center; cursor:pointer; transition:.2s; margin-bottom:16px; }
.upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:rgba(108,140,255,.05); }
.upload-zone .icon { font-size:32px; margin-bottom:8px; }
.upload-zone .label { font-size:13px; color:var(--text-dim); }
.upload-zone .label strong { color:var(--text); }

.file-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.file-tag { display:flex; align-items:center; gap:4px; background:var(--card); border:1px solid var(--border); padding:4px 10px; border-radius:6px; font-size:12px; }
.file-tag .remove { cursor:pointer; color:var(--red); font-weight:700; margin-left:4px; }

.upload-btn { padding:10px 24px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
.upload-btn:hover { background:#5a7ae6; }
.upload-btn:disabled { opacity:.4; cursor:not-allowed; }

.upload-status { margin-top:10px; font-size:12px; color:var(--green); }
.upload-status.error { color:var(--red); }

/* ── Input forms ── */
.form-section { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
.form-title { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--accent); }
.form-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.form-row select, .form-row input { padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; }
.form-row select { min-width:100px; }
.form-row input[type="date"] { min-width:140px; }
.form-row input[type="number"] { width:120px; }
.save-btn { padding:8px 16px; background:var(--green); color:#000; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; }
.save-btn:hover { opacity:.85; }

/* ── Loading ── */
.loading { text-align:center; padding:60px; color:var(--text-dim); }
.spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-bottom:8px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Toast ── */
.toast { position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border); padding:12px 20px; border-radius:8px; font-size:13px; z-index:999; opacity:0; transform:translateY(10px); transition:.3s; }
.toast.show { opacity:1; transform:translateY(0); }

/* ── Responsive ── */
@media (max-width:640px) {
  .header { padding:12px 16px; }
  .panel { padding:16px; }
  .summary-bar { flex-direction:column; }
  .card-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>CALL</span> ANALYTICS</h1>
  <div class="header-right">
    <span style="font-size:11px;color:var(--text-dim)" id="lastSync"></span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="dashboard">📊 현황 대시보드</button>
  <button class="tab-btn" data-tab="upload">📤 데이터 업로드</button>
  <button class="tab-btn" data-tab="input">✏️ 근태 · 이관매출</button>
</div>

<!-- ═══ 현황 대시보드 ═══ -->
<div id="panel-dashboard" class="panel active">
  <div class="week-nav">
    <button id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button id="nextWeek">›</button>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <div id="teamCards"></div>
</div>

<!-- ═══ 데이터 업로드 ═══ -->
<div id="panel-upload" class="panel">
  <div class="upload-zone" id="dropZone">
    <div class="icon">📁</div>
    <div class="label">통화 파일 <strong>2개</strong>를 드래그하거나 클릭하여 선택</div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">1번 파일(녹취 시스템) + 2번 파일(통화목록 시스템)</div>
  </div>
  <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv" style="display:none">
  <div class="file-tags" id="fileTags"></div>
  <button class="upload-btn" id="uploadBtn" disabled>구글시트에 업로드</button>
  <div class="upload-status" id="uploadStatus"></div>
</div>

<!-- ═══ 근태 · 이관매출 입력 ═══ -->
<div id="panel-input" class="panel">
  <div class="form-section">
    <div class="form-title">📅 근태 입력</div>
    <div class="form-row">
      <input type="date" id="attDate">
      <select id="attAgent"></select>
      <select id="attType">
        <option value="연차">연차 (목표 100% 차감)</option>
        <option value="반차">반차 (목표 50% 적용)</option>
      </select>
      <button class="save-btn" onclick="saveAttendance()">저장</button>
    </div>
    <div id="attStatus" style="font-size:12px;color:var(--text-dim);margin-top:8px;"></div>
    <div id="attList" style="margin-top:12px;"></div>
  </div>

  <div class="form-section">
    <div class="form-title">💰 이관매출 입력</div>
    <div class="form-row">
      <input type="date" id="salesDate">
      <select id="salesAgent"></select>
      <input type="number" id="salesAmount" placeholder="금액 (원)" step="10000">
      <button class="save-btn" onclick="saveSales()">저장</button>
    </div>
    <div id="salesStatus" style="font-size:12px;color:var(--text-dim);margin-top:8px;"></div>
    <div id="salesList" style="margin-top:12px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwcK6nX6iyf2PAg7Cbs3LjplHruF-wYJV_j8f_h0Zr4ZHhv_9I4LcIXqvCaFVgzFiwLLw/exec';

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let STATE = {
  settings: [],
  calls: [],
  attendance: [],
  sales: [],
  weekStart: null,
  weekEnd: null,
  files: []
};

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  initTabs();
  initUpload();
  setCurrentWeek(new Date());
  await loadAllData();
});

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });
}

// ══════════════════════════════════════
// WEEK NAVIGATION
// ══════════════════════════════════════
function setCurrentWeek(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  mon.setHours(0,0,0,0);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  STATE.weekStart = mon;
  STATE.weekEnd = fri;
  updateWeekLabel();
}

function updateWeekLabel() {
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  const days = getWeekdays();
  document.getElementById('weekLabel').innerHTML =
    `<strong>${fmt(STATE.weekStart)} ~ ${fmt(STATE.weekEnd)}</strong> (${days}일)`;
}

function getWeekdays() {
  // 해당 주의 평일 수 (월~금)
  const today = new Date();
  today.setHours(0,0,0,0);
  let count = 0;
  for (let i = 0; i < 5; i++) {
    const d = new Date(STATE.weekStart);
    d.setDate(STATE.weekStart.getDate() + i);
    count++;
  }
  return count;
}

document.getElementById('prevWeek').addEventListener('click', () => {
  const d = new Date(STATE.weekStart);
  d.setDate(d.getDate() - 7);
  setCurrentWeek(d);
  renderDashboard();
});
document.getElementById('nextWeek').addEventListener('click', () => {
  const d = new Date(STATE.weekStart);
  d.setDate(d.getDate() + 7);
  setCurrentWeek(d);
  renderDashboard();
});

// ══════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════
async function loadAllData() {
  showLoading('teamCards');
  try {
    const res = await fetch(API_URL + '?action=all');
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message);

    STATE.settings = data.settings || [];
    STATE.calls = data.calls || [];
    STATE.attendance = data.attendance || [];
    STATE.sales = data.sales || [];

    document.getElementById('lastSync').textContent = '동기화: ' + new Date().toLocaleTimeString('ko');
    populateAgentSelects();
    renderDashboard();
    renderAttendanceList();
    renderSalesList();
  } catch (err) {
    document.getElementById('teamCards').innerHTML =
      `<div class="loading" style="color:var(--red)">데이터 로드 실패: ${err.message}</div>`;
  }
}

function showLoading(id) {
  document.getElementById(id).innerHTML =
    '<div class="loading"><div class="spinner"></div><br>데이터 로딩 중...</div>';
}

// ══════════════════════════════════════
// NORMALIZE (파일 파싱용)
// ══════════════════════════════════════
function normalizeDept(raw) {
  if (!raw) return '';
  let s = String(raw).trim().toLowerCase().replace(/\s+/g, '');
  // bm22팀 → BM2-2팀
  const m = s.match(/^bm(\d+)[-]?(\d+)팀?$/i) || s.match(/^bm(\d)(\d)팀?$/i);
  if (m) return `BM${m[1]}-${m[2]}팀`;
  // 이미 정규 형식
  const m2 = String(raw).trim().match(/^BM\d+-\d+팀$/);
  if (m2) return m2[0];
  return String(raw).trim();
}

function normalizeDate(val) {
  if (!val) return '';
  if (val instanceof Date) {
    const y = val.getFullYear();
    const mo = String(val.getMonth()+1).padStart(2,'0');
    const d = String(val.getDate()).padStart(2,'0');
    const h = String(val.getHours()).padStart(2,'0');
    const mi = String(val.getMinutes()).padStart(2,'0');
    return `${y}-${mo}-${d} ${h}:${mi}`;
  }
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}/.test(s)) return s.substring(0, 16);
  return s;
}

function normalizeDuration(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') {
    // 엑셀 시간 형식 (0.xxx = 하루 비율)
    if (val < 1 && val > 0) return Math.round(val * 86400);
    return Math.round(val);
  }
  const s = String(val).trim();
  const parts = s.split(':');
  if (parts.length === 3) return (+parts[0])*3600 + (+parts[1])*60 + (+parts[2]);
  if (parts.length === 2) return (+parts[0])*60 + (+parts[1]);
  return parseInt(s) || 0;
}

// ══════════════════════════════════════
// FILE UPLOAD
// ══════════════════════════════════════
function initUpload() {
  const zone = document.getElementById('dropZone');
  const input = document.getElementById('fileInput');

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });
  input.addEventListener('change', () => { addFiles(input.files); input.value = ''; });
  document.getElementById('uploadBtn').addEventListener('click', processUpload);
}

function addFiles(fileList) {
  for (const f of fileList) {
    if (!STATE.files.find(x => x.name === f.name)) STATE.files.push(f);
  }
  renderFileTags();
}

function renderFileTags() {
  const el = document.getElementById('fileTags');
  el.innerHTML = STATE.files.map((f, i) =>
    `<div class="file-tag">📄 ${f.name} <span class="remove" onclick="removeFile(${i})">✕</span></div>`
  ).join('');
  document.getElementById('uploadBtn').disabled = STATE.files.length === 0;
}

function removeFile(i) {
  STATE.files.splice(i, 1);
  renderFileTags();
}

async function processUpload() {
  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;
  status.className = 'upload-status';
  status.textContent = '파싱 중...';

  try {
    const allRows = [];
    for (const file of STATE.files) {
      const rows = await parseExcelFile(file);
      allRows.push(...rows);
    }
    status.textContent = `${allRows.length}건 파싱 완료. 업로드 중...`;

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'uploadCalls', data: allRows })
    });
    const result = await res.json();
    if (result.status !== 'ok') throw new Error(result.message);

    status.textContent = `✅ 완료! 신규 ${result.added}건 추가, ${result.skipped}건 중복 건너뜀`;
    STATE.files = [];
    renderFileTags();
    showToast('통화 데이터 업로드 완료');
    await loadAllData();
  } catch (err) {
    status.className = 'upload-status error';
    status.textContent = '❌ 업로드 실패: ' + err.message;
  }
  btn.disabled = STATE.files.length === 0;
}

function parseExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'yyyy-mm-dd hh:mm' });

        // 헤더 찾기 (1행 또는 2행)
        let headerIdx = 0;
        for (let i = 0; i < Math.min(3, json.length); i++) {
          const row = (json[i] || []).map(c => String(c||'').trim());
          if (row.includes('날짜') || row.includes('상담원이름') || row.includes('부서명')) {
            headerIdx = i;
            break;
          }
        }
        const headers = json[headerIdx].map(h => String(h||'').trim());
        const colMap = {};
        headers.forEach((h, i) => colMap[h] = i);

        const dateCol = colMap['날짜'] ?? 0;
        const agentCol = colMap['상담원이름'] ?? 2;
        const deptCol = colMap['부서명'] ?? 1;
        const typeCol = colMap['유형'] ?? headers.length - 1;
        const durCol = colMap['통화시간'] ?? 6;
        const phoneCol = colMap['고객전화번호'] ?? 5;

        const rows = [];
        for (let i = headerIdx + 1; i < json.length; i++) {
          const r = json[i];
          if (!r || !r[dateCol]) continue;
          rows.push({
            '날짜': normalizeDate(r[dateCol]),
            '상담원': String(r[agentCol]||'').trim(),
            '부서': normalizeDept(r[deptCol]),
            '유형': String(r[typeCol]||'').trim().toLowerCase() === 'in' ? 'in' : 'out',
            '통화시간': normalizeDuration(r[durCol]),
            '전화번호': String(r[phoneCol]||'').trim()
          });
        }
        resolve(rows);
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('파일 읽기 실패'));
    reader.readAsArrayBuffer(file);
  });
}

// ══════════════════════════════════════
// DASHBOARD RENDERING
// ══════════════════════════════════════
function renderDashboard() {
  const ws = STATE.weekStart;
  const we = STATE.weekEnd;
  const dateStr = d => d.toISOString().substring(0, 10);
  const wsStr = dateStr(ws);
  const weStr = dateStr(we);

  // 이번 주 통화기록 필터
  const weekCalls = STATE.calls.filter(c => {
    const d = String(c['날짜']).substring(0, 10);
    return d >= wsStr && d <= weStr;
  });

  // 이번 주 근태
  const weekAtt = STATE.attendance.filter(a => {
    const d = String(a['날짜']).substring(0, 10);
    return d >= wsStr && d <= weStr;
  });

  // 이번 주 이관매출
  const weekSales = STATE.sales.filter(s => {
    const d = String(s['날짜']).substring(0, 10);
    return d >= wsStr && d <= weStr;
  });

  // 팀별 그룹
  const teams = {};
  STATE.settings.forEach(s => {
    const team = s['소속팀'];
    if (!teams[team]) teams[team] = [];
    teams[team].push(s);
  });

  // 주간 평일 수
  const weekdays = 5;

  // 개인별 집계
  const agentData = {};
  STATE.settings.forEach(s => {
    const name = s['상담원'];
    const dailyGoal = Number(s['일목표분']) || 0;
    const weekSalesGoal = Number(s['주간이관목표']) || 0;

    // 근태 반영: 해당 주 각 날의 계수 합산
    let goalDays = 0;
    let leaveDays = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(ws);
      d.setDate(ws.getDate() + i);
      const ds = dateStr(d);
      const att = weekAtt.find(a => String(a['날짜']).substring(0,10) === ds && a['상담원'] === name);
      if (att) {
        if (att['구분'] === '연차') {
          goalDays += 0;
          leaveDays.push({ date: ds, type: '연차' });
        } else if (att['구분'] === '반차') {
          goalDays += 0.5;
          leaveDays.push({ date: ds, type: '반차' });
        } else {
          goalDays += 1;
        }
      } else {
        goalDays += 1;
      }
    }

    const weekGoalMin = dailyGoal * goalDays;

    // 통화시간 집계 (초 → 분)
    const myCalls = weekCalls.filter(c => c['상담원'] === name);
    const totalSec = myCalls.reduce((sum, c) => sum + (Number(c['통화시간']) || 0), 0);
    const totalMin = totalSec / 60;
    const callCount = myCalls.length;
    const outCount = myCalls.filter(c => c['유형'] === 'out').length;

    // 이관매출 집계
    const mySales = weekSales.filter(s => s['상담원'] === name);
    const totalSalesAmt = mySales.reduce((sum, s) => sum + (Number(s['금액']) || 0), 0);

    agentData[name] = {
      dailyGoal, weekGoalMin, totalMin, totalSec, callCount, outCount,
      weekSalesGoal, totalSalesAmt, leaveDays,
      callPct: weekGoalMin > 0 ? (totalMin / weekGoalMin * 100) : (dailyGoal === 0 ? -1 : 0),
      salesPct: weekSalesGoal > 0 ? (totalSalesAmt / weekSalesGoal * 100) : 0
    };
  });

  // Summary bar
  const allAgents = Object.values(agentData).filter(a => a.dailyGoal > 0);
  const goalMet = allAgents.filter(a => a.callPct >= 100).length;
  const totalCalls = Object.values(agentData).reduce((s, a) => s + a.callCount, 0);
  const totalSalesAll = Object.values(agentData).reduce((s, a) => s + a.totalSalesAmt, 0);

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card"><div class="label">총 통화건수</div><div class="value">${totalCalls.toLocaleString()}</div></div>
    <div class="summary-card"><div class="label">통화목표 달성</div><div class="value green">${goalMet}/${allAgents.length}명</div></div>
    <div class="summary-card"><div class="label">이관매출 합계</div><div class="value">${formatWon(totalSalesAll)}</div></div>
    <div class="summary-card"><div class="label">주간 이관목표</div><div class="value ${totalSalesAll >= 2000000 * allAgents.length ? 'green' : 'yellow'}">${Math.round(totalSalesAll / (2000000 * (allAgents.length||1)) * 100)}%</div></div>
  `;

  // Team cards
  const container = document.getElementById('teamCards');
  let html = '';
  const teamOrder = ['BM2-1팀','BM2-2팀','BM2-3팀','BM3-1팀','BM3-2팀'];
  for (const team of teamOrder) {
    const members = teams[team];
    if (!members) continue;
    html += `<div class="team-section"><div class="team-title">${team}</div><div class="card-grid">`;
    for (const m of members) {
      const name = m['상담원'];
      const d = agentData[name];
      if (!d) continue;
      html += renderPersonCard(name, d);
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function renderPersonCard(name, d) {
  let badge = '';
  if (d.leaveDays.length > 0) {
    const types = d.leaveDays.map(l => l.type);
    if (types.includes('연차')) badge = `<span class="person-badge badge-leave">연차 ${d.leaveDays.filter(l=>l.type==='연차').length}일</span>`;
    if (types.includes('반차')) badge += `<span class="person-badge badge-half">반차 ${d.leaveDays.filter(l=>l.type==='반차').length}일</span>`;
  }

  // 통화시간 진행률
  let callBar = '';
  if (d.dailyGoal === 0) {
    // 목표 없는 인원: 통화시간만 표시
    callBar = `
      <div class="metric-row">
        <div class="metric-label"><span>📞 통화시간</span><span>${Math.round(d.totalMin)}분 (${d.callCount}건)</span></div>
        <div class="metric-detail">목표 미설정</div>
      </div>`;
  } else if (d.weekGoalMin === 0) {
    // 주간 전체 연차
    callBar = `
      <div class="metric-row">
        <div class="metric-label"><span>📞 통화시간</span><span>연차 주간</span></div>
      </div>`;
  } else {
    const pct = Math.min(d.callPct, 100);
    const cls = d.callPct >= 100 ? 'fill-green' : d.callPct >= 70 ? 'fill-yellow' : 'fill-red';
    const icon = d.callPct >= 100 ? ' ✅' : '';
    callBar = `
      <div class="metric-row">
        <div class="metric-label"><span>📞 통화시간</span><span class="pct">${Math.round(d.callPct)}%${icon}</span></div>
        <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="metric-detail">${Math.round(d.totalMin)}분 / ${Math.round(d.weekGoalMin)}분 (${d.outCount}건 아웃콜)</div>
      </div>`;
  }

  // 이관매출 진행률
  const sPct = Math.min(d.salesPct, 100);
  const sCls = d.salesPct >= 100 ? 'fill-green' : d.salesPct >= 70 ? 'fill-yellow' : 'fill-red';
  const sIcon = d.salesPct >= 100 ? ' ✅' : '';
  const salesBar = `
    <div class="metric-row">
      <div class="metric-label"><span>💰 이관매출</span><span class="pct">${Math.round(d.salesPct)}%${sIcon}</span></div>
      <div class="progress-bar"><div class="progress-fill ${sCls}" style="width:${sPct}%"></div></div>
      <div class="metric-detail">${formatWon(d.totalSalesAmt)} / ${formatWon(d.weekSalesGoal)}</div>
    </div>`;

  return `
    <div class="person-card">
      <div class="person-header">
        <span class="person-name">${name}</span>
        <div>${badge}</div>
      </div>
      ${callBar}
      ${salesBar}
    </div>`;
}

function formatWon(n) {
  if (n >= 10000) return Math.round(n / 10000) + '만원';
  return n.toLocaleString() + '원';
}

// ══════════════════════════════════════
// ATTENDANCE INPUT
// ══════════════════════════════════════
function populateAgentSelects() {
  const names = STATE.settings.map(s => s['상담원']);
  ['attAgent', 'salesAgent'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');
  });
  // 기본 날짜: 오늘
  const today = new Date().toISOString().substring(0, 10);
  document.getElementById('attDate').value = today;
  document.getElementById('salesDate').value = today;
}

async function saveAttendance() {
  const date = document.getElementById('attDate').value;
  const agent = document.getElementById('attAgent').value;
  const type = document.getElementById('attType').value;
  if (!date || !agent) return;

  const status = document.getElementById('attStatus');
  status.textContent = '저장 중...';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveAttendance', data: [{ '날짜': date, '상담원': agent, '구분': type }] })
    });
    const result = await res.json();
    if (result.status !== 'ok') throw new Error(result.message);
    status.textContent = `✅ ${agent} ${date} ${type} 저장 완료`;
    showToast('근태 저장 완료');
    await loadAllData();
  } catch (err) {
    status.textContent = '❌ 실패: ' + err.message;
  }
}

function renderAttendanceList() {
  const ws = STATE.weekStart;
  const we = STATE.weekEnd;
  const wsStr = ws.toISOString().substring(0,10);
  const weStr = we.toISOString().substring(0,10);
  const weekAtt = STATE.attendance.filter(a => {
    const d = String(a['날짜']).substring(0,10);
    return d >= wsStr && d <= weStr;
  });
  if (weekAtt.length === 0) {
    document.getElementById('attList').innerHTML = '<div style="font-size:12px;color:var(--text-dim)">이번 주 근태 기록 없음</div>';
    return;
  }
  document.getElementById('attList').innerHTML = weekAtt.map(a =>
    `<div style="font-size:12px;color:var(--text-dim);margin-bottom:2px;">
      ${String(a['날짜']).substring(0,10)} · ${a['상담원']} · <strong style="color:${a['구분']==='연차'?'var(--red)':'var(--yellow)'}">${a['구분']}</strong>
    </div>`
  ).join('');
}

// ══════════════════════════════════════
// SALES INPUT
// ══════════════════════════════════════
async function saveSales() {
  const date = document.getElementById('salesDate').value;
  const agent = document.getElementById('salesAgent').value;
  const amount = Number(document.getElementById('salesAmount').value);
  if (!date || !agent || !amount) return;

  const status = document.getElementById('salesStatus');
  status.textContent = '저장 중...';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveSales', data: [{ '날짜': date, '상담원': agent, '금액': amount }] })
    });
    const result = await res.json();
    if (result.status !== 'ok') throw new Error(result.message);
    status.textContent = `✅ ${agent} ${formatWon(amount)} 저장 완료`;
    document.getElementById('salesAmount').value = '';
    showToast('이관매출 저장 완료');
    await loadAllData();
  } catch (err) {
    status.textContent = '❌ 실패: ' + err.message;
  }
}

function renderSalesList() {
  const ws = STATE.weekStart;
  const we = STATE.weekEnd;
  const wsStr = ws.toISOString().substring(0,10);
  const weStr = we.toISOString().substring(0,10);
  const weekSales = STATE.sales.filter(s => {
    const d = String(s['날짜']).substring(0,10);
    return d >= wsStr && d <= weStr;
  });
  if (weekSales.length === 0) {
    document.getElementById('salesList').innerHTML = '<div style="font-size:12px;color:var(--text-dim)">이번 주 이관매출 기록 없음</div>';
    return;
  }
  document.getElementById('salesList').innerHTML = weekSales.map(s =>
    `<div style="font-size:12px;color:var(--text-dim);margin-bottom:2px;">
      ${String(s['날짜']).substring(0,10)} · ${s['상담원']} · <strong style="color:var(--green)">${formatWon(Number(s['금액']))}</strong>
    </div>`
  ).join('');
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

</html>
